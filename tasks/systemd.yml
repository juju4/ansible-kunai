---

- name: Systemd
  when: ansible_facts['service_mgr'] == 'systemd'
  block:
    - name: Ensure override folder exists
      ansible.builtin.file:
        dest: /etc/systemd/system/00-kunai.service.d
        state: directory
        mode: '0755'

    # if issue, check /var/log/audit/audit.log
    - name: Add systemd hardening options
      ansible.builtin.template:
        src: systemd-override-kunai.service.j2
        dest: /etc/systemd/system/00-kunai.service.d/hardening.conf
        mode: '0644'
        backup: "{{ kunai_backup | default(true) }}"
      notify:
        - Reload systemd
        - Restart kunai
  rescue:
    - name: Import immutable
      ansible.builtin.import_tasks: immutable.yml
      vars:
        target_dir: /etc/systemd/system
        state: pre
    - name: Import immutable
      ansible.builtin.import_tasks: immutable.yml
      vars:
        target_dir: "/etc/systemd/system/00-kunai.service.d"
        state: pre
    - name: Import immutable
      ansible.builtin.import_tasks: immutable.yml
      vars:
        target_dir: "/etc/systemd/system/00-kunai.service.d/hardening.conf"
        state: pre

    - name: Ensure override folder exists (immutable)
      ansible.builtin.file:
        dest: /etc/systemd/system/00-kunai.service.d
        state: directory
        mode: '0755'

    - name: Add systemd hardening options (immutable)
      ansible.builtin.template:
        src: systemd-override-kunai.service.j2
        dest: /etc/systemd/system/00-kunai.service.d/hardening.conf
        mode: '0644'
        backup: "{{ kunai_backup | default(true) }}"
      notify:
        - Reload systemd
        - Restart kunai

    - name: Import immutable
      ansible.builtin.import_tasks: immutable.yml
      vars:
        target_dir: /etc/systemd/system
        state: post
    - name: Import immutable
      ansible.builtin.import_tasks: immutable.yml
      vars:
        target_dir: "/etc/systemd/system/00-kunai.service.d/hardening.conf"
        state: post
